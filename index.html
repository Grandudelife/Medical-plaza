<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محتشمی مدپلازا</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            background-color: #050505;
            font-family: Tahoma, sans-serif;
            /* حذف overflow از body تا مکانیزم انیمیشن‌ها مختل نشود */
        }

        /* یک کانتینر کلی برای جلوگیری از اسکرول افقی مزاحم مرورگر */
        .main-wrapper {
            overflow-x: hidden;
        }

        /* --- افکت هنرمندانه: سر خوردن تصاویر عمودی روی هم --- */
        .sticky-panel {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100vw;
        }

        /* یک سایه بسیار نرم در بالای هر اسلاید برای ایجاد عمق سه‌بعدی هنگام روی هم قرار گرفتن */
        .sticky-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index: 10;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* نمایش کامل عکس بدون برش */
            background-color: #050505;
            display: block;
        }

        /* --- تونل اسکرول افقی --- */
        .horizontal-container {
            height: 100vh;
            width: 100vw;
            position: relative;
            background: #050505;
        }

        .horizontal-wrapper {
            height: 100vh;
            display: flex;
            flex-wrap: nowrap;
            width: max-content; /* عرض داینامیک: به اندازه مجموع طول عکس‌ها باز می‌شود */
            direction: ltr; /* حیاتی برای جلوگیری از باگ اسکرول در سایت‌های فارسی */
        }

        .horizontal-panel {
            width: 100vw;
            height: 100vh;
            flex-shrink: 0; /* جلوگیری از مچاله شدن عکس‌ها */
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        
        <div class="sticky-panel" style="z-index: 1;"><img src="1.png" alt="Slide 1"></div>
        <div class="sticky-panel" style="z-index: 2;"><img src="2.png" alt="Slide 2"></div>
        <div class="sticky-panel" style="z-index: 3;"><img src="3.png" alt="Slide 3"></div>

        <div class="horizontal-container" style="z-index: 4;">
            <div class="horizontal-wrapper">
                <div class="horizontal-panel"><img src="4.png" alt="Slide 4"></div>
                <div class="horizontal-panel"><img src="5.png" alt="Slide 5"></div>
                <div class="horizontal-panel"><img src="6.png" alt="Slide 6"></div>
                <div class="horizontal-panel"><img src="7.png" alt="Slide 7"></div>
                <div class="horizontal-panel"><img src="8.png" alt="Slide 8"></div>
                <div class="horizontal-panel"><img src="9.png" alt="Slide 9"></div>
            </div>
        </div>

        <div class="sticky-panel" style="z-index: 5;"><img src="10.png" alt="Slide 10"></div>
        <div class="sticky-panel" style="z-index: 6;"><img src="11.png" alt="Slide 11"></div>
        <div class="sticky-panel" style="z-index: 7;"><img src="12.png" alt="Slide 12"></div>
        
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.registerPlugin(ScrollTrigger);

            const wrapper = document.querySelector(".horizontal-wrapper");
            
            // محاسبه دقیق مسیری که کانتینر افقی باید طی کند
            function getScrollAmount() {
                return wrapper.scrollWidth - window.innerWidth;
            }

            // انیمیشن حرکت به سمت چپ
            const tween = gsap.to(wrapper, {
                x: () => -getScrollAmount(), 
                ease: "none"
            });

            // گره زدن انیمیشن به اسکرول موس
            ScrollTrigger.create({
                trigger: ".horizontal-container",
                start: "top top",
                end: () => `+=${getScrollAmount()}`,
                pin: true,
                animation: tween,
                scrub: 1, // عدد 1 باعث می‌شود انیمیشن با یک تاخیر نرم و سینمایی موس را دنبال کند
                invalidateOnRefresh: true 
            });
        });
    </script>
</body>
</html>
